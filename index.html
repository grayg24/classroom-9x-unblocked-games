<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom 9x Games | Elite Gaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @property --primary { syntax: '<color>'; initial-value: #22d3ee; inherits: true; }
        @property --primary-glow { syntax: '<color>'; initial-value: rgba(34, 211, 238, 0.4); inherits: true; }
        @property --primary-dark { syntax: '<color>'; initial-value: #0891b2; inherits: true; }
        @property --theme-hue { syntax: '<number>'; initial-value: 0; inherits: true; }

        :root {
            --primary: #22d3ee;
            --primary-glow: rgba(34, 211, 238, 0.4);
            --primary-dark: #0891b2;
            --bg-dark: #020617;
            --transition-speed: 0.3s;
            --theme-hue: 0;
        }

        /* --- PROFILE FRAMES --- */
        .frame-default { border: 2px dashed rgba(255,255,255,0.2); border-radius: 3rem; animation: spin 30s linear infinite; }
        .frame-neon { border: 2px solid var(--primary); box-shadow: 0 0 15px var(--primary-glow); border-radius: 2.5rem; animation: frame-pulse 2s ease-in-out infinite; }
        .frame-obsidian { border: 4px solid #1e293b; background: rgba(15, 23, 42, 0.2); border-radius: 2.5rem; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .frame-solar { border: 2px solid #f59e0b; box-shadow: 0 0 20px rgba(245, 158, 11, 0.5); border-radius: 3rem; animation: solar-spin 10s linear infinite; }
        .frame-interstellar { border: 2px solid #a855f7; box-shadow: 0 0 25px rgba(168, 85, 247, 0.4); border-radius: 2.5rem; }
        .frame-glitch { border: 2px solid #ef4444; border-radius: 2.5rem; animation: glitch-jitter 0.2s infinite; box-shadow: -2px 0 #06b6d4, 2px 0 #ef4444; }

        @keyframes frame-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.02); } }
        @keyframes solar-spin { from { transform: rotate(0deg) scale(1.05); } to { transform: rotate(360deg) scale(1.05); } }
        @keyframes glitch-jitter {
            0% { transform: translate(0); }
            25% { transform: translate(-1px, 1px); }
            50% { transform: translate(1px, -1px); }
            75% { transform: translate(-1px, -1px); }
            100% { transform: translate(0); }
        }

        [data-theme="cyan"] { --primary: #22d3ee; --primary-glow: rgba(34, 211, 238, 0.4); --primary-dark: #0891b2; }
        [data-theme="rose"] { --primary: #fb7185; --primary-glow: rgba(251, 113, 133, 0.4); --primary-dark: #e11d48; }
        [data-theme="emerald"] { --primary: #34d399; --primary-glow: rgba(52, 211, 153, 0.4); --primary-dark: #059669; }
        [data-theme="violet"] { --primary: #a78bfa; --primary-glow: rgba(167, 139, 250, 0.4); --primary-dark: #7c3aed; }
        [data-theme="cobalt"] { --primary: #3b82f6; --primary-glow: rgba(59, 130, 246, 0.4); --primary-dark: #1d4ed8; }
        [data-theme="crimson"] { --primary: #dc2626; --primary-glow: rgba(220, 38, 38, 0.4); --primary-dark: #991b1b; }
        
        [data-theme="gold"] { 
            --primary: #facc15; 
            --primary-glow: rgba(250, 204, 21, 0.8); 
            --primary-dark: #a16207; 
        }

        [data-theme="ironman"] {
            --primary: #ef4444;
            --primary-glow: rgba(250, 204, 21, 0.5);
            --primary-dark: #991b1b;
            --bg-dark: #100a0a;
        }

        [data-theme="ironman"] .bg-theme {
            background: linear-gradient(135deg, #ef4444, #991b1b) !important;
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.3) !important;
            border: 1px solid #facc15 !important;
        }

        [data-theme="hologram"] {
            --primary: #00ffff;
            --primary-glow: rgba(0, 255, 255, 0.6);
            --primary-dark: #0891b2;
            --bg-dark: #000a12;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }

        [data-theme="hologram"] body {
            text-shadow: 0 0 5px var(--primary-glow);
        }

        .effect-shine {
            background-image: linear-gradient(
                110deg, 
                rgba(255,255,255,0) 0%, 
                rgba(255,255,255,0.2) 20%, 
                rgba(255,255,255,0.7) 45%, 
                rgba(255,255,255,1) 50%, 
                rgba(255,255,255,0.7) 55%, 
                rgba(255,255,255,0.2) 80%, 
                rgba(255,255,255,0) 100%
            );
            background-size: 250% 100%;
            animation: ultra-shine 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        
        [data-theme="gold"] .bg-theme,
        [data-theme="gold"] .shadow-theme,
        [data-theme="gold"] .bg-yellow-500 {
            background-image: linear-gradient(
                135deg, 
                #fef08a 0%, 
                #facc15 30%, 
                #ffffff 48%, 
                #ffffff 52%, 
                #facc15 70%, 
                #ca8a04 100%
            ) !important;
            background-size: 250% 100%;
            animation: ultra-shine 2s cubic-bezier(0.4, 0, 0.2, 1) infinite !important;
            box-shadow: 0 0 35px rgba(250, 204, 21, 0.6), inset 0 0 15px rgba(255,255,255,0.7) !important;
            border: 1px solid rgba(255, 255, 255, 0.6) !important;
            color: #000 !important;
        }

        @keyframes ultra-shine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        [data-theme="galaxy"] { 
            --primary: #c084fc; 
            --primary-glow: rgba(192, 132, 252, 0.6); 
            --primary-dark: #6b21a8; 
            --bg-dark: #050414;
        }
        
        [data-theme="rainbow"] {
            animation: rainbow-cycle 3s linear infinite;
            --primary: hsl(var(--theme-hue), 100%, 65%);
            --primary-glow: hsla(var(--theme-hue), 100%, 65%, 0.6);
            --primary-dark: hsl(var(--theme-hue), 100%, 40%);
        }

        [data-theme="rainbow"] .bg-theme,
        [data-theme="rainbow"] .shadow-theme {
            background: linear-gradient(
                45deg,
                #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff, #ff0000
            ) !important;
            background-size: 200% 200% !important;
            animation: rainbow-bg 4s linear infinite !important;
            color: #fff !important;
        }

        @keyframes rainbow-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes rainbow-cycle {
            0% { --theme-hue: 0; }
            100% { --theme-hue: 360; }
        }

        * {
            transition: color var(--transition-speed) ease-in-out, 
                        background-color var(--transition-speed) ease-in-out, 
                        border-color var(--transition-speed) ease-in-out, 
                        box-shadow var(--transition-speed) ease-in-out,
                        filter var(--transition-speed) ease-in-out,
                        transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body.custom-cursor-enabled * { cursor: none !important; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            overflow-x: hidden;
        }

        .text-theme { color: var(--primary) !important; }
        .bg-theme { background-color: var(--primary) !important; }
        .border-theme { border-color: var(--primary) !important; }
        .shadow-theme { box-shadow: 0 0 20px var(--primary-glow) !important; }
        .drop-shadow-theme { filter: drop-shadow(0 0 15px var(--primary-glow)) !important; }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(1000px) rotateX(60deg) translateY(-200px) scale(3);
            transform-origin: top;
            z-index: -1;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        body.animated-bg-enabled .grid-bg {
            animation: grid-move 40s linear infinite;
            opacity: 1;
        }

        @keyframes grid-move {
            from { background-position: 0 0; }
            to { background-position: 0 500px; }
        }

        .glow-cursor {
            width: 12px; height: 12px;
            background-color: var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            mix-blend-mode: screen;
            transform: translate(-50%, -50%);
            left: -100px; top: -100px;
            display: none;
            box-shadow: 0 0 20px var(--primary);
            transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease, border 0.3s ease;
        }

        .glow-cursor.active {
            width: 40px;
            height: 40px;
            background-color: transparent;
            border: 2px solid var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        body.custom-cursor-enabled .glow-cursor { display: block; }

        .glow-cursor-follower {
            width: 32px; height: 32px;
            border: 1px solid var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            opacity: 0.3;
            left: -100px; top: -100px;
            display: none;
            transition: width 0.3s ease, height 0.3s ease, opacity 0.3s ease, background-color 0.3s ease;
        }

        .glow-cursor-follower.active {
            width: 10px;
            height: 10px;
            opacity: 1;
            background-color: var(--primary);
            border: none;
        }

        body.custom-cursor-enabled .glow-cursor-follower { display: block; }

        /* Focused Terminal Glow */
        .terminal-input:focus {
            box-shadow: 0 0 25px var(--primary-glow), inset 0 0 5px var(--primary-glow);
            border-color: var(--primary);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "htm": "https://esm.sh/htm@^3.1.1"
  }
}
</script>
</head>
<body id="app-body">
    <div class="grid-bg"></div>
    <div id="root"></div>
    <div class="glow-cursor" id="cursor"></div>
    <div class="glow-cursor-follower" id="cursor-follower"></div>
    
    <script>
        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('cursor-follower');
        
        window.setCursorActive = (active) => {
            if (active) {
                cursor.classList.add('active');
                follower.classList.add('active');
            } else {
                cursor.classList.remove('active');
                follower.classList.remove('active');
            }
        };

        document.addEventListener('mousemove', (e) => {
            if (!document.body.classList.contains('custom-cursor-enabled')) return;
            window.requestAnimationFrame(() => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                follower.style.left = e.clientX + 'px';
                follower.style.top = e.clientY + 'px';
            });
        });
        document.addEventListener('mouseleave', () => {
            cursor.style.opacity = '0';
            follower.style.opacity = '0';
        });
        document.addEventListener('mouseenter', () => {
            cursor.style.opacity = '1';
            follower.style.opacity = '1';
        });
    </script>
    <script type="module" src="index.js"></script>
</body>
</html>
