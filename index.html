<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom 9x | Elite Unblocked Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #22d3ee;
            --primary-glow: rgba(34, 211, 238, 0.4);
            --bg-dark: #020617;
        }

        [data-theme="cyan"] { --primary: #22d3ee; --primary-glow: rgba(34, 211, 238, 0.4); }
        [data-theme="rose"] { --primary: #fb7185; --primary-glow: rgba(251, 113, 133, 0.4); }
        [data-theme="emerald"] { --primary: #34d399; --primary-glow: rgba(52, 211, 153, 0.4); }
        [data-theme="violet"] { --primary: #a78bfa; --primary-glow: rgba(167, 139, 250, 0.4); }
        [data-theme="cobalt"] { --primary: #3b82f6; --primary-glow: rgba(59, 130, 246, 0.4); }
        [data-theme="crimson"] { --primary: #dc2626; --primary-glow: rgba(220, 38, 38, 0.4); }
        [data-theme="gold"] { --primary: #facc15; --primary-glow: rgba(250, 204, 21, 0.8); }
        [data-theme="galaxy"] { --primary: #c084fc; --primary-glow: rgba(192, 132, 252, 0.6); --bg-dark: #050414; }

        * { transition: color 0.3s, background-color 0.3s, border-color 0.3s, box-shadow 0.3s, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: #f8fafc; 
            overflow-x: hidden; 
            margin: 0;
            min-height: 100vh;
        }

        .text-theme { color: var(--primary) !important; }
        .bg-theme { background-color: var(--primary) !important; }
        .border-theme { border-color: var(--primary) !important; }
        .shadow-theme { box-shadow: 0 0 20px var(--primary-glow) !important; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(to right, var(--primary) 1px, transparent 1px), 
                linear-gradient(to bottom, var(--primary) 1px, transparent 1px);
            background-size: 50px 50px; 
            transform: perspective(1000px) rotateX(60deg) translateY(-200px) scale(3);
            transform-origin: top; 
            z-index: -1; 
            opacity: 0.05; /* Base visibility */
        }

        body.animated-bg-enabled .grid-bg { 
            animation: grid-move 40s linear infinite; 
            opacity: 0.15;
        }

        @keyframes grid-move { 
            from { background-position: 0 0; } 
            to { background-position: 0 500px; } 
        }

        body.custom-cursor-enabled * { cursor: none !important; }
        .glow-cursor {
            width: 12px; height: 12px; background-color: var(--primary); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 10000; mix-blend-mode: screen; transform: translate(-50%, -50%);
            left: -100px; top: -100px; display: none; box-shadow: 0 0 20px var(--primary);
        }
        body.custom-cursor-enabled .glow-cursor { display: block; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/",
        "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
        "htm": "https://esm.sh/htm@^3.1.1"
      }
    }
    </script>
</head>
<body id="app-body">
    <div class="grid-bg"></div>
    <div id="root"></div>
    <div class="glow-cursor" id="cursor"></div>
    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            if (!document.body.classList.contains('custom-cursor-enabled')) return;
            window.requestAnimationFrame(() => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
        });
    </script>
    <script type="module" src="index.js"></script>
</body>
</html>
