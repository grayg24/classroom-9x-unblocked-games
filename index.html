
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom 9x Games | Elite Gaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Modern CSS Variable Animation Engine */
        @property --primary {
          syntax: '<color>';
          initial-value: #22d3ee;
          inherits: true;
        }

        @property --primary-glow {
          syntax: '<color>';
          initial-value: rgba(34, 211, 238, 0.4);
          inherits: true;
        }

        @property --primary-dark {
          syntax: '<color>';
          initial-value: #0891b2;
          inherits: true;
        }

        :root {
            --primary: #22d3ee;
            --primary-glow: rgba(34, 211, 238, 0.4);
            --primary-dark: #0891b2;
            --bg-dark: #020617;
            --transition-speed: 1s; /* Smooth fade speed */
        }

        /* Dynamic Themes - Transitions are handled by @property animation */
        [data-theme="cyan"] {
            --primary: #22d3ee;
            --primary-glow: rgba(34, 211, 238, 0.4);
            --primary-dark: #0891b2;
        }
        [data-theme="rose"] { 
            --primary: #fb7185; 
            --primary-glow: rgba(251, 113, 133, 0.4); 
            --primary-dark: #e11d48; 
        }
        [data-theme="emerald"] { 
            --primary: #34d399; 
            --primary-glow: rgba(52, 211, 153, 0.4); 
            --primary-dark: #059669; 
        }
        [data-theme="amber"] { 
            --primary: #fbbf24; 
            --primary-glow: rgba(251, 191, 36, 0.4); 
            --primary-dark: #d97706; 
        }
        [data-theme="violet"] { 
            --primary: #a78bfa; 
            --primary-glow: rgba(167, 139, 250, 0.4); 
            --primary-dark: #7c3aed; 
        }

        /* CRITICAL: Force hide system cursor everywhere */
        * {
            cursor: none !important;
            /* Every element now smoothly transitions theme colors */
            transition: color var(--transition-speed) ease-in-out, 
                        background-color var(--transition-speed) ease-in-out, 
                        border-color var(--transition-speed) ease-in-out, 
                        box-shadow var(--transition-speed) ease-in-out,
                        filter var(--transition-speed) ease-in-out;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            overflow-x: hidden;
        }

        .text-theme { color: var(--primary) !important; }
        .bg-theme { background-color: var(--primary) !important; }
        .border-theme { border-color: var(--primary) !important; }
        .shadow-theme { box-shadow: 0 0 20px var(--primary-glow) !important; }
        .drop-shadow-theme { filter: drop-shadow(0 0 15px var(--primary-glow)) !important; }

        /* Ensure Icons also transition */
        svg, path {
            transition: fill var(--transition-speed) ease-in-out, stroke var(--transition-speed) ease-in-out !important;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Noise Texture */
        .noise::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            opacity: 0.03;
            z-index: 9999;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Scanlines */
        .scanlines::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 4px;
            z-index: 9998;
            pointer-events: none;
        }

        /* Animated Grid Background */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(1000px) rotateX(60deg) translateY(-200px) scale(3);
            transform-origin: top;
            animation: grid-move 40s linear infinite;
            z-index: -1;
        }

        @keyframes grid-move {
            from { background-position: 0 0; }
            to { background-position: 0 500px; }
        }

        /* Cursor - PERFECTLY CENTERED */
        .glow-cursor {
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            mix-blend-mode: screen;
            transform: translate(-50%, -50%); /* Centering logic */
            box-shadow: 0 0 20px var(--primary);
            transition: background var(--transition-speed) ease-in-out, box-shadow var(--transition-speed) ease-in-out, transform 0.1s ease-out;
            left: -100px; /* Start off-screen */
            top: -100px;
        }

        .glow-cursor-follower {
            width: 32px;
            height: 32px;
            border: 1px solid var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%); /* Centering logic */
            opacity: 0.3;
            transition: border-color var(--transition-speed) ease-in-out, width 0.3s, height 0.3s, left 0.15s ease-out, top 0.15s ease-out;
            left: -100px; /* Start off-screen */
            top: -100px;
        }

        .card-perspective { perspective: 1000px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0"
  }
}
</script>
</head>
<body class="noise scanlines" id="app-body">
    <div class="grid-bg"></div>
    <div id="root"></div>
    <div class="glow-cursor" id="cursor"></div>
    <div class="glow-cursor-follower" id="cursor-follower"></div>
    
    <script>
        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('cursor-follower');
        
        document.addEventListener('mousemove', (e) => {
            window.requestAnimationFrame(() => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                
                follower.style.left = e.clientX + 'px';
                follower.style.top = e.clientY + 'px';
            });
        });

        document.addEventListener('mousedown', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(0.7)';
            follower.style.transform = 'translate(-50%, -50%) scale(1.6)';
        });

        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
            follower.style.transform = 'translate(-50%, -50%) scale(1)';
        });

        window.setCursorActive = (active) => {
            if (active) {
                follower.style.width = '50px';
                follower.style.height = '50px';
                follower.style.opacity = '0.6';
                cursor.style.transform = 'translate(-50%, -50%) scale(1.2)';
            } else {
                follower.style.width = '32px';
                follower.style.height = '32px';
                follower.style.opacity = '0.3';
                cursor.style.transform = 'translate(-50%, -50%) scale(1)';
            }
        };
    </script>
    <script type="module" src="index.tsx"></script>
</body>
</html>
