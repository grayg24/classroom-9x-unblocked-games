<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom 9x Games | Elite Gaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @property --primary { syntax: '<color>'; initial-value: #22d3ee; inherits: true; }
        @property --primary-glow { syntax: '<color>'; initial-value: rgba(34, 211, 238, 0.4); inherits: true; }
        @property --primary-dark { syntax: '<color>'; initial-value: #0891b2; inherits: true; }
        @property --theme-hue { syntax: '<number>'; initial-value: 0; inherits: true; }

        :root {
            --primary: #22d3ee;
            --primary-glow: rgba(34, 211, 238, 0.4);
            --primary-dark: #0891b2;
            --bg-dark: #020617;
            --transition-speed: 0.3s;
            --theme-hue: 0;
        }

        [data-theme="cyan"] { --primary: #22d3ee; --primary-glow: rgba(34, 211, 238, 0.4); --primary-dark: #0891b2; }
        [data-theme="rose"] { --primary: #fb7185; --primary-glow: rgba(251, 113, 133, 0.4); --primary-dark: #e11d48; }
        [data-theme="emerald"] { --primary: #34d399; --primary-glow: rgba(52, 211, 153, 0.4); --primary-dark: #059669; }
        [data-theme="violet"] { --primary: #a78bfa; --primary-glow: rgba(167, 139, 250, 0.4); --primary-dark: #7c3aed; }
        [data-theme="cobalt"] { --primary: #3b82f6; --primary-glow: rgba(59, 130, 246, 0.4); --primary-dark: #1d4ed8; }
        [data-theme="crimson"] { --primary: #dc2626; --primary-glow: rgba(220, 38, 38, 0.4); --primary-dark: #991b1b; }
        
        /* Intensified Gold Theme */
        [data-theme="gold"] { 
            --primary: #facc15; 
            --primary-glow: rgba(250, 204, 21, 0.8); 
            --primary-dark: #a16207; 
        }

        /* Enhanced Shine Effect */
        .effect-shine {
            background-image: linear-gradient(
                110deg, 
                rgba(255,255,255,0) 0%, 
                rgba(255,255,255,0.2) 20%, 
                rgba(255,255,255,0.7) 45%, 
                rgba(255,255,255,1) 50%, 
                rgba(255,255,255,0.7) 55%, 
                rgba(255,255,255,0.2) 80%, 
                rgba(255,255,255,0) 100%
            );
            background-size: 250% 100%;
            animation: ultra-shine 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        
        /* Global Metallic Gold Overrides */
        [data-theme="gold"] .bg-theme,
        [data-theme="gold"] .shadow-theme,
        [data-theme="gold"] .bg-yellow-500 {
            background-image: linear-gradient(
                135deg, 
                #fef08a 0%, 
                #facc15 30%, 
                #ffffff 48%, 
                #ffffff 52%, 
                #facc15 70%, 
                #ca8a04 100%
            ) !important;
            background-size: 250% 100%;
            animation: ultra-shine 2s cubic-bezier(0.4, 0, 0.2, 1) infinite !important;
            box-shadow: 0 0 35px rgba(250, 204, 21, 0.6), inset 0 0 15px rgba(255,255,255,0.7) !important;
            border: 1px solid rgba(255, 255, 255, 0.6) !important;
            color: #000 !important;
        }

        @keyframes ultra-shine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Galaxy Theme */
        [data-theme="galaxy"] { 
            --primary: #c084fc; 
            --primary-glow: rgba(192, 132, 252, 0.6); 
            --primary-dark: #6b21a8; 
            --bg-dark: #050414;
        }
        body[data-theme="galaxy"] .grid-bg {
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(147, 51, 234, 0.25) 0%, transparent 60%),
                radial-gradient(circle at 80% 70%, rgba(219, 39, 119, 0.25) 0%, transparent 60%),
                linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            animation: nebula-drift 40s linear infinite;
        }
        
        /* Reworked Matrix RGB Theme */
        [data-theme="rainbow"] {
            animation: rainbow-cycle 3s linear infinite;
            --primary: hsl(var(--theme-hue), 100%, 65%);
            --primary-glow: hsla(var(--theme-hue), 100%, 65%, 0.6);
            --primary-dark: hsl(var(--theme-hue), 100%, 40%);
        }

        [data-theme="rainbow"] .bg-theme,
        [data-theme="rainbow"] .shadow-theme {
            background: linear-gradient(
                45deg,
                #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff, #ff0000
            ) !important;
            background-size: 300% 300% !important;
            animation: move-gradient 5s ease infinite !important;
            box-shadow: 0 0 25px var(--primary-glow) !important;
            border: 1px solid rgba(255,255,255,0.4) !important;
            color: #fff !important;
        }

        [data-theme="rainbow"] .text-theme {
            background: linear-gradient(
                45deg,
                #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff, #ff0000
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 300% 300%;
            animation: move-gradient 5s ease infinite;
            filter: drop-shadow(0 0 8px var(--primary-glow));
        }

        @keyframes move-gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes rainbow-cycle {
            0% { --theme-hue: 0; }
            100% { --theme-hue: 360; }
        }

        * {
            transition: color var(--transition-speed) ease-in-out, 
                        background-color var(--transition-speed) ease-in-out, 
                        border-color var(--transition-speed) ease-in-out, 
                        box-shadow var(--transition-speed) ease-in-out,
                        filter var(--transition-speed) ease-in-out,
                        transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body.custom-cursor-enabled * {
            cursor: none !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            overflow-x: hidden;
        }

        .text-theme { color: var(--primary) !important; }
        .bg-theme { background-color: var(--primary) !important; }
        .border-theme { border-color: var(--primary) !important; }
        .shadow-theme { box-shadow: 0 0 20px var(--primary-glow) !important; }
        .drop-shadow-theme { filter: drop-shadow(0 0 15px var(--primary-glow)) !important; }

        .input-glow:focus {
            box-shadow: 0 0 15px var(--primary-glow) !important;
            border-color: var(--primary) !important;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        
        .noise::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            opacity: 0.03;
            z-index: 9999;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .scanlines::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 4px;
            z-index: 9998;
            pointer-events: none;
        }

        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(1000px) rotateX(60deg) translateY(-200px) scale(3);
            transform-origin: top;
            z-index: -1;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        body.animated-bg-enabled .grid-bg {
            animation: grid-move 40s linear infinite;
            opacity: 1;
        }

        @keyframes grid-move {
            from { background-position: 0 0; }
            to { background-position: 0 500px; }
        }

        /* Cursor Core Style */
        .glow-cursor {
            width: 12px; height: 12px;
            background-color: var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            mix-blend-mode: screen;
            transform: translate(-50%, -50%);
            left: -100px; top: -100px;
            display: none;
            box-shadow: 0 0 20px var(--primary);
            transition: background-color 0.3s ease, transform 0.1s ease-out, border-radius 0.2s ease, width 0.2s ease, height 0.2s ease, opacity 0.2s ease;
        }

        body.custom-cursor-enabled .glow-cursor { display: block; }

        .glow-cursor-follower {
            width: 32px; height: 32px;
            border: 1px solid var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            opacity: 0.3;
            left: -100px; top: -100px;
            display: none;
            transition: border-color 0.3s ease, transform 0.15s ease-out, opacity 0.2s ease;
        }

        body.custom-cursor-enabled .glow-cursor-follower { display: block; }
        .card-perspective { perspective: 1000px; }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0"
  }
}
</script>
</head>
<body class="noise scanlines" id="app-body">
    <div class="grid-bg"></div>
    <div id="root"></div>
    <div class="glow-cursor" id="cursor"></div>
    <div class="glow-cursor-follower" id="cursor-follower"></div>
    
    <script>
        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('cursor-follower');
        
        let mouseX = -100;
        let mouseY = -100;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            if (!document.body.classList.contains('custom-cursor-enabled')) return;
            
            window.requestAnimationFrame(() => {
                cursor.style.left = mouseX + 'px';
                cursor.style.top = mouseY + 'px';
                follower.style.left = mouseX + 'px';
                follower.style.top = mouseY + 'px';
            });
        });

        document.addEventListener('mouseover', (e) => {
          const target = e.target;
          if (!target) return;
          const interactive = target.closest('button, a, input, select, textarea, [role="button"], .cursor-pointer');
          window.setCursorActive(!!interactive);
        });

        document.addEventListener('mousedown', () => {
            if (!document.body.classList.contains('custom-cursor-enabled')) return;
            document.documentElement.style.setProperty('--cursor-scale', '0.7');
            cursor.style.transform = 'translate(-50%, -50%) scale(0.7)';
        });

        document.addEventListener('mouseup', () => {
            if (!document.body.classList.contains('custom-cursor-enabled')) return;
            document.documentElement.style.setProperty('--cursor-scale', '1');
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
        });

        // Hide cursor when exiting the browser window
        document.addEventListener('mouseleave', () => {
            cursor.style.opacity = '0';
            follower.style.opacity = '0';
        });

        // Show cursor when entering the browser window
        document.addEventListener('mouseenter', () => {
            cursor.style.opacity = '1';
            follower.style.opacity = '1';
        });

        window.setCursorActive = (active) => {
            if (!document.body.classList.contains('custom-cursor-enabled')) return;
            const scale = active ? 1.8 : 1;
            const cursorScale = active ? 1.2 : 1;
            
            follower.style.transform = `translate(-50%, -50%) scale(${scale})`;
            follower.style.opacity = active ? '0.6' : '0.3';
            
            document.documentElement.style.setProperty('--cursor-scale', cursorScale);
            cursor.style.transform = `translate(-50%, -50%) scale(${cursorScale})`;
        };
    </script>
    <script type="module" src="index.tsx"></script>
</body>
</html>
